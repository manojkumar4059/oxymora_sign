<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxy - Account Linking</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #219150; }
        .logo { font-weight: bold; font-size: 24px; color: #27ae60; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">OXYMORA</div>
        <h2>Link to Alexa</h2>
        <form action="/login_process" method="POST">
            <input type="hidden" name="state" value="{{ state }}">
            <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
            
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login & Link</button>
        </form>
    </div>
</body>
</html>
